<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auth — Firebase Ready</title>

  <!-- ============================================================
    STEP 1: Add Firebase SDK scripts
    Go to https://console.firebase.google.com
    Create a project → Add Web App → copy the config object below.
    Replace the CDN imports if you prefer npm:
      npm install firebase
      import { initializeApp } from "firebase/app";
  ============================================================ -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>


  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      --bg:       #0c0f14;
      --surface:  #141820;
      --border:   rgba(255,255,255,0.07);
      --accent:   #e8c97a;
      --accent2:  #7ad4e8;
      --text:     #f0ede6;
      --muted:    #6b7280;
      --danger:   #f87171;
      --success:  #6ee7b7;
      --radius:   14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: var(--accent);
      top: -200px; left: -200px;
      animation: drift 10s ease-in-out infinite alternate;
    }
    body::after {
      width: 500px; height: 500px;
      background: var(--accent2);
      bottom: -150px; right: -150px;
      animation: drift 14s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(60px, 40px); }
    }

    /* ── Card ──────────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-name {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    /* ── Tabs ──────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 32px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #0c0f14;
    }

    /* ── Form panels ───────────────────────────────────────── */
    .panel { display: none; }
    .panel.active { display: block; }

    h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* ── Inputs ────────────────────────────────────────────── */
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,201,122,0.12);
    }
    input::placeholder { color: var(--muted); }

    /* ── Button ────────────────────────────────────────────── */
    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      background: var(--accent);
      color: #0c0f14;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn:hover  { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Message ───────────────────────────────────────────── */
    .msg {
      margin-top: 16px;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13.5px;
      display: none;
    }
    .msg.error   { background: rgba(248,113,113,0.12); color: var(--danger);  border: 1px solid rgba(248,113,113,0.25); display: block; }
    .msg.success { background: rgba(110,231,183,0.10); color: var(--success); border: 1px solid rgba(110,231,183,0.20); display: block; }

    /* ── Dashboard (shown after login) ────────────────────── */
    #dashboard {
      display: none;
      position: relative;
      z-index: 1;
      text-align: center;
      animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    #dashboard .card { text-align: left; }
    .avatar {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: #0c0f14;
      margin: 0 auto 20px;
    }
    .welcome-name {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      text-align: center;
      margin-bottom: 6px;
    }
    .welcome-email {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 28px;
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 13.5px;
      padding: 8px 0;
      color: var(--muted);
    }
    .info-row span:last-child { color: var(--text); }

    .btn-outline {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-outline:hover { background: rgba(248,113,113,0.08); }
  </style>
</head>
<body>

  <!-- ── Auth Card ──────────────────────────────────────────── -->
  <div id="authCard">
    <div class="card">
      <div class="logo">
        <div class="logo-icon">✦</div>
        <span class="logo-name">Lumina</span>
      </div>

      <!-- Tab switcher -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn"        onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- ── LOGIN PANEL ─────────────────────────────────── -->
      <div id="loginPanel" class="panel active">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to continue to your account.</p>

        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••"/>
        </div>

        <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
        <div class="msg" id="loginMsg"></div>
      </div>

      <!-- ── SIGN UP PANEL ───────────────────────────────── -->
      <div id="signupPanel" class="panel">
        <h2>Create account</h2>
        <p class="subtitle">Join us — it only takes a moment.</p>

        <div class="field">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Juan dela Cruz"/>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="At least 6 characters"/>
        </div>

        <button class="btn" id="signupBtn" onclick="handleSignup()">Create Account</button>
        <div class="msg" id="signupMsg"></div>
      </div>
    </div>
  </div>

  <!-- ── Dashboard (shown after successful login) ───────────── -->
  <div id="dashboard">
    <div class="card">
      <div class="avatar" id="userAvatar">?</div>
      <p class="welcome-name" id="welcomeName">Hello!</p>
      <p class="welcome-email" id="welcomeEmail"></p>

      <hr class="divider"/>

      <div class="info-row">
        <span>Account status</span>
        <span style="color: var(--success);">● Active</span>
      </div>
      <div class="info-row">
        <span>Email verified</span>
        <span id="verifiedStatus">—</span>
      </div>
      <div class="info-row">
        <span>User ID</span>
        <span id="userId" style="font-size:11px; font-family: monospace;">—</span>
      </div>

      <button class="btn-outline" onclick="handleLogout()">Sign Out</button>
    </div>
  </div>


  <script>
    // ============================================================
    // STEP 2: Replace this config object with YOUR Firebase config.
    //
    // How to get it:
    //   1. Go to https://console.firebase.google.com
    //   2. Open your project → Project Settings (gear icon)
    //   3. Scroll to "Your apps" → select your Web App
    //   4. Copy the firebaseConfig object and paste it below.
    // ============================================================
  const firebaseConfig = {
  apiKey: "AIzaSyDpLo3ckZ90Kkj0fadX4YSEt9LkFaZuJNk",
  authDomain: "myweb-9aab6.firebaseapp.com",
  projectId: "myweb-9aab6",
  storageBucket: "myweb-9aab6.firebasestorage.app",
  messagingSenderId: "515510453320",
  appId: "1:515510453320:web:3058b85c857225a5a0847d"
};

// STEP 3: Initialize Firebase App
firebase.initializeApp(firebaseConfig);

// STEP 4: Get references to Auth and Firestore
const auth = firebase.auth();
const db = firebase.firestore();


    // ============================================================
    // STEP 5: Listen for authentication state changes.
    //         This fires every time the user logs in or out.
    //         It's the right place to show/hide the dashboard.
    // ============================================================
    auth.onAuthStateChanged((user) => {
      if (user) {
        // User is signed in — show the dashboard
        showDashboard(user);
      } else {
        // User is signed out — show the auth card
        document.getElementById('authCard').style.display = 'block';
        document.getElementById('dashboard').style.display  = 'none';
      }
    });


    // ============================================================
    // STEP 6: SIGN UP — Create a new user with email & password.
     firebase.auth().createUserWithEmailAndPassword()
    //         returns a Promise with the new user's credentials.
    // ============================================================
    async function handleSignup() {
      const name     = document.getElementById('signupName').value.trim();
      const email    = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const btn      = document.getElementById('signupBtn');
      const msg      = document.getElementById('signupMsg');

      // Basic client-side validation
      if (!name || !email || !password) {
        showMsg(msg, 'Please fill in all fields.', 'error');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Creating account…';
      msg.className   = 'msg';

      try {
        // Firebase creates the user in Authentication
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // STEP 6b (optional): Save the display name on the user profile
        await user.updateProfile({ displayName: name });

        // --------------------------------------------------------
        // STEP 7 (optional): If you want to save extra user data
        // (like name, role, etc.) to Firestore, add this:
        //
        const db = firebase.firestore();
        await db.collection('users').doc(user.uid).set({
             name:      name,
             email:     email,
             createdAt: firebase.firestore.FieldValue.serverTimestamp()
           });
        
       

        showMsg(msg, '🎉 Account created! Signing you in…', 'success');

  } catch (error) {
    // Log the actual error to the developer console so you can see it!
    console.error("Firebase Error:", error); 
    
    showMsg(msg, friendlyError(error.code), 'error');
    btn.disabled    = false;
    btn.textContent = 'Create Account'; // (Or 'Sign In' for the login function)
  }
}


// ============================================================
// STEP 8: LOG IN — Sign in an existing user.
// firebase.auth().signInWithEmailAndPassword()
//         returns a Promise with the user's credentials.
// ============================================================
async function handleLogin() {
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn      = document.getElementById('loginBtn');
      const msg      = document.getElementById('loginMsg');

      if (!email || !password) {
        showMsg(msg, 'Please enter your email and password.', 'error');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Signing in…';
      msg.className   = 'msg';

      try {
        // Firebase verifies credentials and returns user object
        await auth.signInWithEmailAndPassword(email, password);
        // onAuthStateChanged (STEP 5) will handle the redirect

      } catch (error) {
        showMsg(msg, friendlyError(error.code), 'error');
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    }


    // ============================================================
    // STEP 9: LOG OUT — Sign the current user out.
    // firebase.auth().signOut() 
    // ============================================================
    async function handleLogout() {
      try {
        await auth.signOut();
        // onAuthStateChanged will detect sign-out and show auth card
      } catch (error) {
        console.error('Logout error:', error);
      }
    }


    // ── UI helpers ──────────────────────────────────────────────

    function showDashboard(user) {
      document.getElementById('authCard').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';

      const name  = user.displayName || user.email.split('@')[0];
      const email = user.email;

      document.getElementById('userAvatar').textContent   = name.charAt(0).toUpperCase();
      document.getElementById('welcomeName').textContent  = `Hello, ${name}!`;
      document.getElementById('welcomeEmail').textContent = email;
      document.getElementById('userId').textContent       = user.uid;
      document.getElementById('verifiedStatus').textContent = user.emailVerified ? '✅ Yes' : '⏳ Pending';
    }

    function switchTab(tab) {
      document.getElementById('loginPanel').classList.toggle('active',  tab === 'login');
      document.getElementById('signupPanel').classList.toggle('active', tab === 'signup');
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
      });
      // Reset button states when switching tabs
      document.getElementById('loginBtn').disabled    = false;
      document.getElementById('loginBtn').textContent = 'Sign In';
      document.getElementById('signupBtn').disabled    = false;
      document.getElementById('signupBtn').textContent = 'Create Account';
    }

    function showMsg(el, text, type) {
      el.textContent = text;
      el.className   = `msg ${type}`;
    }

    // Map Firebase error codes to user-friendly messages
    function friendlyError(code) {
      const map = {
        'auth/email-already-in-use':    'This email is already registered.',
        'auth/invalid-email':           'Please enter a valid email address.',
        'auth/weak-password':           'Password must be at least 6 characters.',
        'auth/user-not-found':          'No account found with this email.',
        'auth/wrong-password':          'Incorrect password. Please try again.',
        'auth/too-many-requests':       'Too many attempts. Try again later.',
        'auth/network-request-failed':  'Network error. Check your connection.',
        'auth/invalid-credential':      'Invalid email or password.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }
  </script>
</body>
</html>
